<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamy Garden — Job Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a2e;
      --panel:       #16213e;
      --panel-hover: #1e2a4a;
      --accent:      #c0c0ff;
      --accent-dim:  #4a4a8a;
      --btn:         #4a6fd4;
      --btn-hover:   #3a5fc4;
      --text:        #eee;
      --text-dim:    #888;
      --score-high:  #50dc78;
      --score-mid:   #f0b429;
      --score-low:   #e05555;
      --error-bg:    #2e1a1a;
      --error-border:#8a3030;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(160, 160, 255, 0.4);
    }

    .subtitle {
      color: var(--text-dim);
      margin-top: 8px;
      font-size: 1rem;
    }

    .hidden { display: none !important; }

    /* ── Upload section ── */
    #upload-section {
      width: 100%;
      max-width: 600px;
    }

    #drop-zone {
      border: 2px dashed var(--accent-dim);
      background: var(--panel);
      border-radius: 14px;
      padding: 50px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--panel-hover);
    }

    #drop-zone svg {
      opacity: 0.5;
    }

    #drop-zone p {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .browse-label {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 8px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .browse-label:hover { background: #5a5aaa; }

    #file-input { display: none; }

    #file-name {
      margin-top: 12px;
      color: var(--accent);
      font-size: 0.9rem;
      min-height: 1.2em;
      text-align: center;
    }

    #find-jobs-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: var(--btn);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, opacity 0.2s;
    }

    #find-jobs-btn:hover:not(:disabled) { background: var(--btn-hover); }
    #find-jobs-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Loading section ── */
    #loading-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 60px 0;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg {
      color: var(--text-dim);
      font-size: 0.95rem;
      transition: opacity 0.4s;
    }

    /* ── Error section ── */
    #error-section {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    #error-msg {
      color: var(--score-low);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .secondary-btn:hover { border-color: var(--accent); background: var(--panel-hover); }

    /* ── Results section ── */
    #results-section { width: 100%; max-width: 900px; }

    .profile-banner {
      background: var(--panel);
      border: 1px solid var(--accent-dim);
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 28px;
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .profile-banner strong {
      color: var(--accent);
      font-size: 1rem;
    }

    #results-section h2 {
      font-size: 1.4rem;
      color: var(--accent);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    #job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── Job card ── */
    .job-card {
      background: var(--panel);
      border: 1px solid var(--accent-dim);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .job-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 6px 24px rgba(192, 192, 255, 0.12);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-badge {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .apply-btn {
      background: var(--btn);
      color: #fff;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .apply-btn:hover { background: var(--btn-hover); }

    .job-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .job-meta {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .score-bar {
      height: 5px;
      background: #2a2a4a;
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .match-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .match-reason {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.5;
    }

    .no-results {
      color: var(--text-dim);
      font-size: 0.95rem;
      padding: 20px 0;
    }

    #search-again-btn {
      margin-top: 36px;
      padding: 12px 32px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dreamy Garden</h1>
    <p class="subtitle">Job Finder powered by Claude AI</p>
  </header>

  <!-- Upload -->
  <section id="upload-section">
    <div id="drop-zone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c0c0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drag &amp; drop your resume here</p>
      <p style="font-size:0.8rem">PDF or DOCX, up to 10 MB</p>
      <label class="browse-label" for="file-input">Browse File</label>
      <input type="file" id="file-input" accept=".pdf,.docx" />
    </div>
    <p id="file-name"></p>
    <button id="find-jobs-btn" disabled>Find My Dream Jobs</button>
  </section>

  <!-- Loading -->
  <section id="loading-section" class="hidden">
    <div class="spinner"></div>
    <p id="loading-msg">Parsing your resume...</p>
  </section>

  <!-- Error -->
  <section id="error-section" class="hidden">
    <p id="error-msg"></p>
    <button class="secondary-btn" onclick="resetApp()">Try Again</button>
  </section>

  <!-- Results -->
  <section id="results-section" class="hidden">
    <div id="candidate-profile"></div>
    <h2>Matching Jobs</h2>
    <div id="job-grid"></div>
    <button id="search-again-btn" class="secondary-btn" onclick="resetApp()">Search Again</button>
  </section>

  <script>
    let selectedFile = null;
    let loadingTimers = [];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileNameEl = document.getElementById('file-name');
    const findBtn = document.getElementById('find-jobs-btn');

    fileInput.addEventListener('change', e => selectFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      selectFile(e.dataTransfer.files[0]);
    });
    dropZone.addEventListener('click', e => {
      if (e.target !== fileInput && !e.target.closest('label')) fileInput.click();
    });

    function selectFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['pdf', 'docx'].includes(ext)) {
        showError('Please upload a PDF or DOCX file.');
        return;
      }
      selectedFile = file;
      fileNameEl.textContent = file.name;
      findBtn.disabled = false;
    }

    findBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      showLoading();

      const formData = new FormData();
      formData.append('resume', selectedFile);

      try {
        const res = await fetch('/api/analyze', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error. Please try again.');
        showResults(data);
      } catch (err) {
        showError(err.message);
      }
    });

    function showLoading() {
      hideAll();
      document.getElementById('loading-section').classList.remove('hidden');
      const msgs = [
        [0,    'Parsing your resume...'],
        [2000, 'Extracting your skills and experience...'],
        [5000, 'Searching for matching job listings...'],
        [12000,'Claude is evaluating the best matches...'],
        [22000,'Almost there, finalizing results...'],
      ];
      const el = document.getElementById('loading-msg');
      msgs.forEach(([delay, text]) => {
        loadingTimers.push(setTimeout(() => { el.textContent = text; }, delay));
      });
    }

    function showResults(data) {
      clearTimers();
      hideAll();

      const profile = data.candidateProfile || {};
      const skills = Array.isArray(profile.topSkills) ? profile.topSkills.join(', ') : '';
      document.getElementById('candidate-profile').innerHTML = `
        <div class="profile-banner">
          <strong>${escHtml(profile.primaryRole || 'Candidate')}</strong>
          ${profile.seniorityLevel ? ' &bull; ' + escHtml(profile.seniorityLevel) : ''}
          ${profile.yearsExperience ? ' &bull; ' + escHtml(profile.yearsExperience) : ''}
          ${skills ? ' &bull; Skills: ' + escHtml(skills) : ''}
        </div>`;

      const grid = document.getElementById('job-grid');
      const jobs = Array.isArray(data.jobs) ? data.jobs : [];

      if (!jobs.length) {
        grid.innerHTML = '<p class="no-results">No strong matches found. Try uploading an updated resume.</p>';
      } else {
        grid.innerHTML = jobs
          .sort((a, b) => b.matchScore - a.matchScore)
          .map(renderCard)
          .join('');
      }

      document.getElementById('results-section').classList.remove('hidden');
    }

    function renderCard(job) {
      const score = Math.min(100, Math.max(0, Number(job.matchScore) || 0));
      const color = score >= 85 ? 'var(--score-high)'
                  : score >= 70 ? 'var(--score-mid)'
                  : 'var(--score-low)';
      return `
        <div class="job-card">
          <div class="card-header">
            <span class="score-badge" style="background:${color}22;border-color:${color};color:${color}">${score}%</span>
            <a href="${escAttr(job.applyUrl)}" target="_blank" rel="noopener noreferrer" class="apply-btn">Apply →</a>
          </div>
          <h3 class="job-title">${escHtml(job.title)}</h3>
          <p class="job-meta">${escHtml(job.company)} &bull; ${escHtml(job.location)}</p>
          <div class="score-bar">
            <div class="score-fill" style="width:${score}%;background:${color}"></div>
          </div>
          <p class="match-label">Why you match</p>
          <p class="match-reason">${escHtml(job.matchReason)}</p>
        </div>`;
    }

    function showError(msg) {
      clearTimers();
      hideAll();
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-section').classList.remove('hidden');
    }

    function resetApp() {
      clearTimers();
      selectedFile = null;
      fileNameEl.textContent = '';
      findBtn.disabled = true;
      fileInput.value = '';
      hideAll();
      document.getElementById('upload-section').classList.remove('hidden');
    }

    function hideAll() {
      ['upload-section', 'loading-section', 'error-section', 'results-section']
        .forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    function clearTimers() {
      loadingTimers.forEach(clearTimeout);
      loadingTimers = [];
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escAttr(str) {
      const s = String(str ?? '');
      if (!/^https?:\/\//i.test(s)) return '#';
      return escHtml(s);
    }
  </script>
</body>
</html>
